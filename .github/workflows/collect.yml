name: Collect Oil Prices

permissions:
  contents: write

concurrency:
  group: oil-data-collector
  cancel-in-progress: false

on:
  schedule:
    # Oil futures trade almost 24h a day, Mon-Fri.
    - cron: "*/30 0-23 * * 1-5"
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Fetch oil prices
        run: python scripts/fetchOil.py
      - name: Commit and push data
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          git add data/
          git commit -m "Add oil price data $(date -u +%Y-%m-%dT%H:%M:%S)" || echo "No changes to commit"
          git fetch origin main
          git rebase origin/main
          git push origin main
